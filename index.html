<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>你的名字 | 个人空间</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:#0a0a0f;color:#e8e8ec;font-family:'Inter',-apple-system,sans-serif;overflow-x:hidden;}
    
    .glow-text{
      background: linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#34d399 100%);
      -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    }
    .glow-border{
      border:1px solid rgba(167,139,250,0.2);
      box-shadow:0 0 30px rgba(167,139,250,0.08);
    }
    .card-hover{
      transition:all 0.4s cubic-bezier(0.4,0,0.2,1);
    }
    .card-hover:hover{
      transform:translateY(-4px);
      border-color:rgba(167,139,250,0.4);
      box-shadow:0 20px 60px rgba(167,139,250,0.12);
    }
    @keyframes fadeUp{
      from{opacity:0;transform:translateY(40px);}
      to{opacity:1;transform:translateY(0);}
    }
    @keyframes float{
      0%,100%{transform:translateY(0);}
      50%{transform:translateY(-20px);}
    }
    .animate-fade-up{animation:fadeUp 0.8s ease-out forwards;opacity:0;}
    .delay-1{animation-delay:0.1s;}
    .delay-2{animation-delay:0.2s;}
    .delay-3{animation-delay:0.3s;}
    .delay-4{animation-delay:0.4s;}
    .nav-blur{
      backdrop-filter:blur(20px);
      -webkit-backdrop-filter:blur(20px);
      background:rgba(10,10,15,0.8);
    }
    .skill-tag{
      background:rgba(167,139,250,0.08);
      border:1px solid rgba(167,139,250,0.15);
      transition:all 0.3s ease;
    }
    .skill-tag:hover{
      background:rgba(167,139,250,0.2);
      border-color:rgba(167,139,250,0.4);
      transform:scale(1.05);
    }
    .timeline-line{
      background:linear-gradient(to bottom,#a78bfa,#60a5fa,#34d399);
    }
    .btn-primary{
      background:linear-gradient(135deg,#7c3aed,#2563eb);
      transition:all 0.3s ease;
    }
    .btn-primary:hover{
      transform:scale(1.02);
      box-shadow:0 10px 40px rgba(124,58,237,0.4);
    }
    .btn-ghost{
      border:1px solid rgba(255,255,255,0.15);
      transition:all 0.3s ease;
    }
    .btn-ghost:hover{
      border-color:rgba(167,139,250,0.5);
      background:rgba(167,139,250,0.1);
    }
    .scroll-indicator{animation:float 2s ease-in-out infinite;}
    .reveal{opacity:0;transform:translateY(30px);transition:all 0.8s ease-out;}
    .reveal.active{opacity:1;transform:translateY(0);}
    
    a{color:inherit;text-decoration:none;}
    
    @media(max-width:768px){
      .grid-2{grid-template-columns:1fr!important;}
      .hero-title{font-size:40px!important;}
    }
  </style>
</head>
<body>

<!-- 导航 -->
<nav class="nav-blur" style="position:fixed;top:0;left:0;right:0;z-index:100;padding:16px 24px;display:flex;justify-content:space-between;align-items:center;">
  <div style="font-weight:800;font-size:20px;letter-spacing:-0.5px;">
    <span class="glow-text">YOUR</span><span style="color:#fff;">SPACE</span>
  </div>
  <div style="display:flex;gap:24px;font-size:14px;font-weight:500;">
    <a href="#about" style="color:#9ca3af;transition:color 0.3s;" onmouseover="this.style.color='#a78bfa'" onmouseout="this.style.color='#9ca3af'">关于</a>
    <a href="#skills" style="color:#9ca3af;transition:color 0.3s;" onmouseover="this.style.color='#a78bfa'" onmouseout="this.style.color='#9ca3af'">技能</a>
    <a href="#works" style="color:#9ca3af;transition:color 0.3s;" onmouseover="this.style.color='#a78bfa'" onmouseout="this.style.color='#9ca3af'">作品</a>
    <a href="#timeline" style="color:#9ca3af;transition:color 0.3s;" onmouseover="this.style.color='#a78bfa'" onmouseout="this.style.color='#9ca3af'">经历</a>
    <a href="#contact" style="color:#9ca3af;transition:color 0.3s;" onmouseover="this.style.color='#a78bfa'" onmouseout="this.style.color='#9ca3af'">联系</a>
  </div>
</nav>

<!-- Hero -->
<section style="min-height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;padding:120px 24px 80px;position:relative;overflow:hidden;">
  <div style="position:absolute;top:20%;left:10%;width:300px;height:300px;background:rgba(167,139,250,0.08);border-radius:50%;filter:blur(80px);animation:float 6s ease-in-out infinite;"></div>
  <div style="position:absolute;bottom:20%;right:10%;width:250px;height:250px;background:rgba(96,165,250,0.08);border-radius:50%;filter:blur(80px);animation:float 8s ease-in-out infinite reverse;"></div>
  
  <div style="position:relative;z-index:1;">
    <div class="animate-fade-up" style="display:inline-block;padding:8px 20px;border-radius:50px;border:1px solid rgba(167,139,250,0.3);font-size:13px;color:#a78bfa;margin-bottom:32px;letter-spacing:2px;text-transform:uppercase;">
      ✨ 欢迎来到我的数字宇宙
    </div>
    <h1 class="animate-fade-up delay-1 hero-title" style="font-size:clamp(40px,8vw,80px);font-weight:800;line-height:1.1;letter-spacing:-2px;margin-bottom:24px;">
      我是 <span class="glow-text">你的名字</span><br>
      <span style="color:#6b7280;font-weight:300;">创造数字体验的设计师</span>
    </h1>
    <p class="animate-fade-up delay-2" style="font-size:clamp(16px,2.5vw,20px);color:#9ca3af;max-width:600px;line-height:1.8;margin:0 auto 48px;font-weight:400;">
      在这里，代码与美学交汇。我专注于打造令人难忘的数字产品，将复杂的技术转化为优雅的视觉语言。
    </p>
    <div class="animate-fade-up delay-3" style="display:flex;gap:16px;justify-content:center;flex-wrap:wrap;">
      <a href="#works" class="btn-primary" style="padding:14px 36px;border-radius:12px;color:#fff;font-weight:600;font-size:15px;">浏览作品 →</a>
      <a href="#contact" class="btn-ghost" style="padding:14px 36px;border-radius:12px;color:#e8e8ec;font-weight:600;font-size:15px;">联系我</a>
    </div>
  </div>
  <div class="scroll-indicator" style="position:absolute;bottom:40px;left:50%;transform:translateX(-50%);color:#6b7280;font-size:24px;">↓</div>
</section>

<!-- 关于 -->
<section id="about" style="padding:120px 24px;max-width:1100px;margin:0 auto;">
  <div class="reveal grid-2" style="display:grid;grid-template-columns:1fr 1fr;gap:80px;align-items:center;">
    <div>
      <div style="font-size:13px;color:#a78bfa;letter-spacing:3px;text-transform:uppercase;margin-bottom:16px;font-weight:600;">关于我</div>
      <h2 style="font-size:clamp(28px,4vw,42px);font-weight:700;line-height:1.2;margin-bottom:24px;letter-spacing:-1px;">
        用设计讲述<br><span class="glow-text">每一个故事</span>
      </h2>
      <p style="color:#9ca3af;line-height:1.9;font-size:16px;margin-bottom:20px;">
        我是一名全栈设计师与开发者，拥有5年以上的数字产品设计经验。我相信好的设计不仅仅是视觉上的美观，更是解决问题的艺术。
      </p>
      <p style="color:#9ca3af;line-height:1.9;font-size:16px;margin-bottom:32px;">
        从概念到落地，我参与过20+商业项目，涵盖品牌设计、Web应用、移动端产品等多个领域。
      </p>
      <div style="display:flex;gap:40px;">
        <div><div style="font-size:36px;font-weight:800;color:#fff;">5+
