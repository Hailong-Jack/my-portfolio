<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartGIS Web3D - 海龙空间智能</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#000;color:#e8e8ec;font-family:'Inter',-apple-system,sans-serif;overflow:hidden}
#canvas-container{position:fixed;inset:0;z-index:1}
.nav-bar{position:fixed;top:0;left:0;right:0;padding:12px 20px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);background:rgba(0,0,0,.8);border-bottom:1px solid rgba(255,255,255,.08);z-index:20}
.nav-bar a{color:#9ca3af;text-decoration:none;font-size:13px;font-weight:500;transition:color .3s}
.nav-bar a:hover{color:#a78bfa}
.logo{font-weight:800;font-size:16px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.city-panel{position:fixed;top:50%;left:16px;transform:translateY(-50%);padding:14px;border-radius:14px;background:rgba(0,0,0,.8);border:1px solid rgba(167,139,250,.15);backdrop-filter:blur(10px);max-width:180px;z-index:20;max-height:65vh;overflow-y:auto}
.city-panel h3{font-size:12px;color:#a78bfa;margin-bottom:10px;letter-spacing:1px;text-transform:uppercase}
.city-item{padding:6px 10px;margin-bottom:3px;border-radius:6px;cursor:pointer;transition:all .3s;font-size:12px;color:#9ca3af;display:flex;align-items:center;gap:6px}
.city-item:hover{background:rgba(167,139,250,.15);color:#fff}
.city-item.active{background:rgba(167,139,250,.2);color:#fff;border:1px solid rgba(167,139,250,.3)}
.city-dot{width:6px;height:6px;border-radius:50%;background:#ff6b6b;box-shadow:0 0 6px #ff6b6b}
.city-dot.world{background:#4ecdc4;box-shadow:0 0 6px #4ecdc4}
.info-popup{position:fixed;padding:14px 18px;border-radius:14px;background:rgba(0,0,0,.9);border:1px solid rgba(167,139,250,.25);backdrop-filter:blur(10px);z-index:25;pointer-events:none;opacity:0;transition:opacity .3s;max-width:220px}
.info-popup.show{opacity:1}
.info-popup h4{font-size:14px;font-weight:700;margin-bottom:4px;color:#fff}
.info-popup p{font-size:11px;color:#9ca3af;line-height:1.5}
.info-popup .coords{font-size:10px;color:#6b7280;margin-top:4px;font-family:monospace}
.controls{position:fixed;bottom:16px;right:16px;display:flex;gap:6px;z-index:20}
.ctrl-btn{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#9ca3af;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
.ctrl-btn:hover{background:rgba(167,139,250,.2);border-color:rgba(167,139,250,.4);color:#fff}
.loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .8s}
.loading.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:2px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin 1s linear infinite}
.loading-text{margin-top:12px;font-size:12px;color:#6b7280;letter-spacing:2px}
.loading-sub{margin-top:6px;font-size:11px;color:#4b5563}
@keyframes spin{to{transform:rotate(360deg)}}
.tooltip{position:fixed;padding:4px 10px;border-radius:4px;background:rgba(167,139,250,.2);border:1px solid rgba(167,139,250,.3);color:#fff;font-size:11px;pointer-events:none;z-index:30;opacity:0;transition:opacity .2s;white-space:nowrap}
.tooltip.show{opacity:1}
.texture-status{position:fixed;top:60px;right:16px;padding:8px 14px;border-radius:8px;background:rgba(0,0,0,.7);border:1px solid rgba(255,255,255,.1);font-size:11px;color:#6b7280;z-index:20;transition:all .3s}
.texture-status.loaded{color:#34d399;border-color:rgba(52,211,153,.3)}
.texture-status.error{color:#f87171;border-color:rgba(248,113,113,.3)}
@media(max-width:768px){
.city-panel{left:8px;top:auto;bottom:60px;transform:none;max-width:140px;padding:10px;max-height:25vh}
.city-panel h3{font-size:10px}
.city-item{font-size:10px;padding:5px 6px}
.controls{bottom:8px;right:8px}
.texture-status{top:50px;right:8px;font-size:10px;padding:6px 10px}
}
</style>
</head>
<body>

<div class="loading" id="loading">
<div class="loading-spinner"></div>
<div class="loading-text">正在加载卫星影像...</div>
<div class="loading-sub" id="loadDetail">初始化三维引擎</div>
</div>

<div class="nav-bar">
<div style="display:flex;align-items:center;gap:8px">
<svg width="24" height="24" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="url(#lg1)" stroke-width="2"/><circle cx="16" cy="16" r="6" fill="url(#lg1)"/><defs><linearGradient id="lg1" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#34d399"/></linearGradient></defs></svg>
<span class="logo">海龙空间智能 · Web3D</span>
</div>
<a href="index.html">← 返回主页</a>
</div>

<div class="texture-status" id="texStatus">🛰️ 加载卫星影像...</div>

<div id="canvas-container"></div>

<div class="city-panel" id="cityPanel">
<h3>📍 城市节点</h3>
<div id="cityList"></div>
</div>

<div class="info-popup" id="infoPopup">
<h4 id="popupTitle">城市名称</h4>
<p id="popupDesc">描述</p>
<div class="coords" id="popupCoords">经纬度</div>
</div>

<div class="controls">
<div class="ctrl-btn" id="btnReset" title="重置视角">⌖</div>
<div class="ctrl-btn" id="btnZoomIn" title="放大">+</div>
<div class="ctrl-btn" id="btnZoomOut" title="缩小">−</div>
<div class="ctrl-btn" id="btnRotate" title="自动旋转">↻</div>
</div>

<div class="tooltip" id="tooltip"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== 纹理URL =====
const TEX_URLS = {
  day: 'https://unpkg.com/three-globe@2.24.13/example/img/earth-blue-marble.jpg',
  bump: 'https://unpkg.com/three-globe@2.24.13/example/img/earth-topology.png',
  night: 'https://unpkg.com/three-globe@2.24.13/example/img/earth-night.jpg',
  clouds: 'https://unpkg.com/three-globe@2.24.13/example/img/earth-clouds.png'
};

// ===== 城市数据 =====
const cities = [
  {name:'北京',lat:39.9042,lon:116.4074,desc:'中国首都，政治文化中心',type:'cn'},
  {name:'上海',lat:31.2304,lon:121.4737,desc:'国际金融中心，长三角龙头',type:'cn'},
  {name:'广州',lat:23.1291,lon:113.2644,desc:'南方门户，粤港澳大湾区核心',type:'cn'},
  {name:'深圳',lat:22.5431,lon:114.0579,desc:'科技创新之都',type:'cn'},
  {name:'杭州',lat:30.2741,lon:120.1551,desc:'数字经济第一城',type:'cn'},
  {name:'成都',lat:30.5728,lon:104.0668,desc:'西部中心城市，天府之国',type:'cn'},
  {name:'武汉',lat:30.5928,lon:114.3055,desc:'九省通衢，中部崛起核心',type:'cn'},
  {name:'西安',lat:34.3416,lon:108.9398,desc:'古都新貌，一带一路起点',type:'cn'},
  {name:'南京',lat:32.0603,lon:118.7969,desc:'六朝古都，创新名城',type:'cn'},
  {name:'重庆',lat:29.5630,lon:106.5516,desc:'山城雾都，西部直辖市',type:'cn'},
  {name:'纽约',lat:40.7128,lon:-74.0060,desc:'世界金融中心',type:'world'},
  {name:'伦敦',lat:51.5074,lon:-0.1278,desc:'欧洲金融中心',type:'world'},
  {name:'东京',lat:35.6762,lon:139.6503,desc:'亚洲科技中心',type:'world'},
  {name:'悉尼',lat:-33.8688,lon:151.2093,desc:'南半球门户',type:'world'},
];

function latLonToVector3(lat, lon, radius) {
  const phi = (90 - lat) * Math.PI / 180;
  const theta = (lon + 180) * Math.PI / 180;
  return new THREE.Vector3(
    -radius * Math.sin(phi) * Math.cos(theta),
    radius * Math.cos(phi),
    radius * Math.sin(phi) * Math.sin(theta)
  );
}

// ===== Three.js 场景 =====
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();

const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 3.5);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x000000, 1);
container.appendChild(renderer.domElement);

// ===== 加载纹理 =====
const textureLoader = new THREE.TextureLoader();
let texturesLoaded = 0;
const totalTextures = 2; // day + bump (night和clouds作为可选)

function updateLoadStatus(text) {
  document.getElementById('loadDetail').textContent = text;
}

function onTextureLoad() {
  texturesLoaded++;
  updateLoadStatus(`加载卫星影像 ${texturesLoaded}/${totalTextures}...`);
  if (texturesLoaded >= totalTextures) {
    document.getElementById('texStatus').textContent = '✅ 卫星影像已加载';
    document.getElementById('texStatus').classList.add('loaded');
    setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
  }
}

function onTextureError() {
  document.getElementById('texStatus').textContent = '⚠️ 影像加载失败，使用备用纹理';
  document.getElementById('texStatus').classList.add('error');
  setTimeout(() => document.getElementById('loading').classList.add('hidden'), 500);
}

// 加载白天纹理
const earthDayTexture = textureLoader.load(TEX_URLS.day, onTextureLoad, undefined, onTextureError);
earthDayTexture.colorSpace = THREE.SRGBColorSpace;

// 加载凹凸纹理
const earthBumpTexture = textureLoader.load(TEX_URLS.bump, onTextureLoad, undefined, onTextureError);

// 可选：夜晚纹理
let earthNightTexture = null;
textureLoader.load(TEX_URLS.night, (tex) => {
  earthNightTexture = tex;
  earthNightTexture.colorSpace = THREE.SRGBColorSpace;
}, undefined, () => {});

// ===== 地球组 =====
const earthGroup = new THREE.Group();
scene.add(earthGroup);

// 地球主体 - 使用真实纹理
const earthGeometry = new THREE.SphereGeometry(1, 128, 128);
const earthMaterial = new THREE.MeshPhongMaterial({
  map: earthDayTexture,
  bumpMap: earthBumpTexture,
  bumpScale: 0.05,
  specular: new THREE.Color(0x333333),
  shininess: 5
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
earthGroup.add(earth);

// 云层
const cloudGeometry = new THREE.SphereGeometry(1.02, 128, 128);
const cloudMaterial = new THREE.MeshPhongMaterial({
  map: null, // 稍后加载
  transparent: true,
  opacity: 0,
  blending: THREE.AdditiveBlending,
  side: THREE.DoubleSide,
  depthWrite: false
});
const clouds = new THREE.Mesh(cloudGeometry, cloudMaterial);
earthGroup.add(clouds);

// 尝试加载云层
textureLoader.load(TEX_URLS.clouds, (tex) => {
  cloudMaterial.map = tex;
  cloudMaterial.opacity = 0.4;
}, undefined, () => {});

// 大气层光晕（Shader实现）
const atmosphereVertexShader = `
  varying vec3 vNormal;
  void main() {
    vNormal = normalize(normalMatrix * normal);
    gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
  }
`;

const atmosphereFragmentShader = `
  varying vec3 vNormal;
  void main() {
    float intensity = pow(0.6 - dot(vNormal, vec3(0, 0, 1.0)), 2.0);
    gl_FragColor = vec4(0.3, 0.6, 1.0, 1.0) * intensity * 0.8;
  }
`;

const atmosphereGeometry = new THREE.SphereGeometry(1.2, 64, 64);
const atmosphereMaterial = new THREE.ShaderMaterial({
  vertexShader: atmosphereVertexShader,
  fragmentShader: atmosphereFragmentShader,
  blending: THREE.AdditiveBlending,
  side: THREE.BackSide,
  transparent: true
});
const atmosphere = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
earthGroup.add(atmosphere);

// 外发光
const glowGeometry = new THREE.SphereGeometry(1.35, 64, 64);
const glowMaterial = new THREE.MeshBasicMaterial({
  color: 0x4c8bf5,
  transparent: true,
  opacity: 0.04,
  side: THREE.BackSide
});
const glow = new THREE.Mesh(glowGeometry, glowMaterial);
earthGroup.add(glow);

// ===== 城市标记 =====
const cityMeshes = [];
const cityGroup = new THREE.Group();
earthGroup.add(cityGroup);

// 创建标记纹理（发光点）
function createMarkerTexture(color) {
  const canvas = document.createElement('canvas');
  canvas.width = 64;
  canvas.height = 64;
  const ctx = canvas.getContext('2d');
  const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
  grad.addColorStop(0, color);
  grad.addColorStop(0.3, color.replace('1)', '0.5)'));
  grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, 64, 64);
  return new THREE.CanvasTexture(canvas);
}

cities.forEach((city, i) => {
  const pos = latLonToVector3(city.lat, city.lon, 1.01);
  const color = city.type === 'cn' ? 'rgba(255,100,100,' : 'rgba(100,200,200,';

  // 标记精灵
  const spriteMaterial = new THREE.SpriteMaterial({
    map: createMarkerTexture(color + '1)'),
    transparent: true,
    opacity: 0.9,
    blending: THREE.AdditiveBlending
  });
  const sprite = new THREE.Sprite(spriteMaterial);
  sprite.position.copy(pos);
  sprite.scale.set(0.06, 0.06, 1);
  cityGroup.add(sprite);

  // 脉冲环
  const ringGeo = new THREE.RingGeometry(0.015, 0.025, 32);
  const ringMat = new THREE.MeshBasicMaterial({
    color: city.type === 'cn' ? 0xff6b6b : 0x4ecdc4,
    transparent: true,
    opacity: 0.5,
    side: THREE.DoubleSide
  });
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.position.copy(pos.clone().multiplyScalar(1.005));
  ring.lookAt(new THREE.Vector3(0,0,0));
  cityGroup.add(ring);

  // 垂直光束
  const beamGeo = new THREE.CylinderGeometry(0.003, 0.003, 0.3, 8);
  const beamMat = new THREE.MeshBasicMaterial({
    color: city.type === 'cn' ? 0xff6b6b : 0x4ecdc4,
    transparent: true,
    opacity: 0.15
  });
  const beam = new THREE.Mesh(beamGeo, beamMat);
  beam.position.copy(pos.clone().multiplyScalar(1.15));
  beam.lookAt(new THREE.Vector3(0,0,0));
  beam.rotateX(Math.PI / 2);
  cityGroup.add(beam);

  cityMeshes.push({
    name: city.name, desc: city.desc, lat: city.lat, lon: city.lon,
    sprite: sprite, ring: ring, beam: beam, color: city.type === 'cn' ? 0xff6b6b : 0x4ecdc4,
    phase: Math.random() * Math.PI * 2
  });
});

// ===== 卫星轨道 =====
const orbitGroup = new THREE.Group();
earthGroup.add(orbitGroup);

for (let i = 0; i < 3; i++) {
  const radius = 1.5 + i * 0.25;
  const points = [];
  for (let j = 0; j <= 128; j++) {
    const angle = (j / 128) * Math.PI * 2;
    points.push(new THREE.Vector3(
      Math.cos(angle) * radius,
      Math.sin(angle) * radius * 0.15,
      Math.sin(angle) * radius
    ));
  }
  const orbitGeo = new THREE.BufferGeometry().setFromPoints(points);
  const orbitMat = new THREE.LineBasicMaterial({
    color: 0x4c8bf5,
    transparent: true,
    opacity: 0.04
  });
  orbitGroup.add(new THREE.Line(orbitGeo, orbitMat));
}

// ===== 星空背景 =====
const starsGeo = new THREE.BufferGeometry();
const starsCount = 5000;
const starsPos = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) {
  starsPos[i] = (Math.random() - 0.5) * 100;
}
starsGeo.setAttribute('position', new THREE.BufferAttribute(starsPos, 3));
const starsMat = new THREE.PointsMaterial({ size: 0.02, color: 0xffffff, transparent: true, opacity: 0.7 });
const stars = new THREE.Points(starsGeo, starsMat);
scene.add(stars);

// ===== 光源 =====
scene.add(new THREE.AmbientLight(0x404040, 0.3));
const sunLight = new THREE.DirectionalLight(0xffffff, 1.2);
sunLight.position.set(5, 3, 5);
scene.add(sunLight);
const backLight = new THREE.DirectionalLight(0x4c8bf5, 0.2);
backLight.position.set(-5, -2, -5);
scene.add(backLight);

// ===== 交互控制 =====
let isDragging = false, autoRotate = true;
let prevPos = { x: 0, y: 0 };
let targetRot = { x: 0.3, y: 0 };
let currRot = { x: 0.3, y: 0 };
let targetZoom = 3.5;
let currZoom = 3.5;

renderer.domElement.addEventListener('mousedown', e => {
  isDragging = true; autoRotate = false;
  prevPos = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mousemove', e => {
  if (!isDragging) return;
  targetRot.y += (e.clientX - prevPos.x) * 0.005;
  targetRot.x += (e.clientY - prevPos.y) * 0.005;
  targetRot.x = Math.max(-1, Math.min(1, targetRot.x));
  prevPos = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener('mouseup', () => isDragging = false);
renderer.domElement.addEventListener('mouseleave', () => isDragging = false);
renderer.domElement.addEventListener('wheel', e => {
  targetZoom += e.deltaY * 0.003;
  targetZoom = Math.max(1.5, Math.min(10, targetZoom));
});

renderer.domElement.addEventListener('touchstart', e => {
  if (e.touches.length === 1) {
    isDragging = true; autoRotate = false;
    prevPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
});
renderer.domElement.addEventListener('touchmove', e => {
  if (isDragging && e.touches.length === 1) {
    targetRot.y += (e.touches[0].clientX - prevPos.x) * 0.008;
    targetRot.x += (e.touches[0].clientY - prevPos.y) * 0.008;
    targetRot.x = Math.max(-1, Math.min(1, targetRot.x));
    prevPos = { x: e.touches[0].clientX, y: e.touches[0].clientY };
  }
});
renderer.domElement.addEventListener('touchend', () => isDragging = false);

// ===== Raycaster 点击检测 =====
const raycaster = new THREE.Raycaster();
const mouse = new THREE.Vector2();

renderer.domElement.addEventListener('click', (event) => {
  if (isDragging) return;
  mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
  mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(mouse, camera);

  const sprites = cityMeshes.map(c => c.sprite);
  const intersects = raycaster.intersectObjects(sprites);
  if (intersects.length > 0) {
    const idx = sprites.indexOf(intersects[0].object);
    if (idx >= 0) flyToCity(idx, event);
  }
});

// ===== 飞到城市 =====
function flyToCity(index, event) {
  autoRotate = false;
  const city = cityMeshes[index];
  const phi = (90 - city.lat) * Math.PI / 180;
  const theta = (city.lon + 180) * Math.PI / 180;
  const camDist = 2.0;
  const camX = camDist * Math.sin(phi) * Math.cos(theta + Math.PI);
  const camY = camDist * Math.cos(phi);
  const camZ = camDist * Math.sin(phi) * Math.sin(theta + Math.PI);

  const startPos = camera.position.clone();
  const endPos = new THREE.Vector3(camX, camY, camZ);
  const startRotY = targetRot.y, startRotX = targetRot.x;
  const endRotY = -(theta + Math.PI) + Math.PI / 2;
  const endRotX = phi - Math.PI / 2;

  let progress = 0;
  function animateFly() {
    progress += 0.015;
    if (progress > 1) progress = 1;
    const ease = 1 - Math.pow(1 - progress, 3);
    camera.position.lerpVectors(startPos, endPos, ease);
    targetRot.x = startRotX + (endRotX - startRotX) * ease;
    targetRot.y = startRotY + (endRotY - startRotY) * ease;
    targetZoom = 2.0;
    if (progress < 1) requestAnimationFrame(animateFly);
  }
  animateFly();
  showPopup(city, event);
  highlightCity(index);
}

function showPopup(city, event) {
  document.getElementById('popupTitle').textContent = city.name;
  document.getElementById('popupDesc').textContent = city.desc;
  document.getElementById('popupCoords').textContent = `${city.lat.toFixed(2)}°N, ${Math.abs(city.lon).toFixed(2)}°${city.lon >= 0 ? 'E' : 'W'}`;
  const popup = document.getElementById('infoPopup');
  popup.classList.add('show');
  if (event) {
    popup.style.left = Math.min(event.clientX + 20, window.innerWidth - 250) + 'px';
    popup.style.top = Math.max(event.clientY - 50, 10) + 'px';
  }
  setTimeout(() => popup.classList.remove('show'), 5000);
}

// ===== 城市列表面板 =====
const cityList = document.getElementById('cityList');
cities.forEach((city, i) => {
  const item = document.createElement('div');
  item.className = 'city-item';
  item.innerHTML = `<div class="city-dot ${city.type === 'world' ? 'world' : ''}"></div>${city.name}`;
  item.addEventListener('click', () => flyToCity(i, {clientX: window.innerWidth/2, clientY: window.innerHeight/2}));
  cityList.appendChild(item);
});

function highlightCity(index) {
  document.querySelectorAll('.city-item').forEach((el, i) => el.classList.toggle('active', i === index));
}

// ===== 控制按钮 =====
document.getElementById('btnReset').addEventListener('click', () => {
  targetRot = { x: 0.3, y: 0 }; targetZoom = 3.5; autoRotate = true; highlightCity(-1);
});
document.getElementById('btnZoomIn').addEventListener('click', () => targetZoom = Math.max(1.5, targetZoom - 0.5));
document.getElementById('btnZoomOut').addEventListener('click', () => targetZoom = Math.min(10, targetZoom + 0.5));
document.getElementById('btnRotate').addEventListener('click', () => autoRotate = !autoRotate);

// ===== 动画循环 =====
let time = 0;
function animate() {
  requestAnimationFrame(animate);
  time += 0.01;

  if (autoRotate && !isDragging) targetRot.y += 0.0008;
  currRot.x += (targetRot.x - currRot.x) * 0.05;
  currRot.y += (targetRot.y - currRot.y) * 0.05;
  currZoom += (targetZoom - currZoom) * 0.05;

  earthGroup.rotation.x = currRot.x;
  earthGroup.rotation.y = currRot.y;
  camera.position.z = currZoom;

  // 城市动画
  cityMeshes.forEach(c => {
    const s = 1 + Math.sin(time * 2 + c.phase) * 0.3;
    c.sprite.scale.set(0.06 * s, 0.06 * s, 1);
    c.ring.scale.setScalar(1 + Math.sin(time * 1.5 + c.phase) * 0.4);
    c.ring.material.opacity = 0.3 + Math.sin(time * 2 + c.phase) * 0.2;
    c.beam.material.opacity = 0.1 + Math.sin(time + c.phase) * 0.08;
  });

  // 云层缓慢旋转
  clouds.rotation.y += 0.0002;

  // 轨道旋转
  orbitGroup.rotation.y += 0.0003;

  // 大气层呼吸
  atmosphere.scale.setScalar(1 + Math.sin(time * 0.3) * 0.003);

  // 星空微动
  stars.rotation.y += 0.00005;

  renderer.render(scene, camera);
}

window.addEventListener('resize', () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

animate();
</script>
