<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartGIS Web3D - 海龙空间智能</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#000;font-family:'Inter',-apple-system,sans-serif;color:#e8e8ec}
#globe-container{position:fixed;inset:0;z-index:1}
#globe-container canvas{display:block}

/* 导航 */
.nav-bar{position:fixed;top:0;left:0;right:0;padding:10px 16px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);background:rgba(0,0,0,.75);border-bottom:1px solid rgba(255,255,255,.06);z-index:100}
.nav-bar a{color:#9ca3af;text-decoration:none;font-size:13px;font-weight:500;transition:color .3s}
.nav-bar a:hover{color:#a78bfa}
.logo{font-weight:800;font-size:15px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}

/* 搜索框 */
.search-box{position:fixed;top:52px;left:50%;transform:translateX(-50%);z-index:100;display:flex;align-items:center;gap:8px;background:rgba(0,0,0,.8);border:1px solid rgba(167,139,250,.25);border-radius:12px;padding:6px 6px 6px 14px;backdrop-filter:blur(10px);min-width:320px;max-width:90vw}
.search-box input{background:transparent;border:none;color:#fff;font-size:14px;outline:none;flex:1;font-family:inherit}
.search-box input::placeholder{color:#6b7280}
.search-box button{background:linear-gradient(135deg,#7c3aed,#2563eb);color:#fff;border:none;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;transition:all .3s;white-space:nowrap}
.search-box button:hover{transform:scale(1.02);box-shadow:0 4px 20px rgba(124,58,237,.4)}
.search-box button:disabled{opacity:.5;cursor:not-allowed}
.search-results{position:fixed;top:96px;left:50%;transform:translateX(-50%);z-index:100;background:rgba(0,0,0,.9);border:1px solid rgba(167,139,250,.2);border-radius:12px;backdrop-filter:blur(10px);max-width:400px;width:90vw;max-height:300px;overflow-y:auto;display:none}
.search-results.show{display:block}
.search-result-item{padding:10px 14px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:all .3s;font-size:13px}
.search-result-item:hover{background:rgba(167,139,250,.15)}
.search-result-item:last-child{border-bottom:none}
.search-result-item .name{color:#fff;font-weight:600;margin-bottom:2px}
.search-result-item .addr{color:#6b7280;font-size:11px}

/* 城市面板 */
.city-panel{position:fixed;top:50%;left:12px;transform:translateY(-50%);padding:12px;border-radius:12px;background:rgba(0,0,0,.8);border:1px solid rgba(167,139,250,.15);backdrop-filter:blur(10px);max-width:150px;z-index:50;max-height:60vh;overflow-y:auto}
.city-panel h3{font-size:11px;color:#a78bfa;margin-bottom:8px;letter-spacing:1px;text-transform:uppercase}
.city-item{padding:5px 8px;margin-bottom:2px;border-radius:6px;cursor:pointer;transition:all .3s;font-size:11px;color:#9ca3af;display:flex;align-items:center;gap:6px}
.city-item:hover{background:rgba(167,139,250,.15);color:#fff}
.city-dot{width:6px;height:6px;border-radius:50%;background:#ff6b6b;box-shadow:0 0 6px #ff6b6b;flex-shrink:0}
.city-dot.world{background:#4ecdc4;box-shadow:0 0 6px #4ecdc4}

/* 详情面板 */
.detail-panel{position:fixed;right:-420px;top:0;bottom:0;width:400px;max-width:90vw;background:rgba(5,5,10,.95);border-left:1px solid rgba(167,139,250,.2);backdrop-filter:blur(20px);z-index:80;transition:right .4s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.detail-panel.open{right:0}
.detail-panel .panel-header{padding:16px 20px;border-bottom:1px solid rgba(255,255,255,.06);display:flex;justify-content:space-between;align-items:center}
.detail-panel .panel-header h3{font-size:16px;font-weight:700;color:#fff}
.detail-panel .panel-header .close-btn{width:32px;height:32px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#9ca3af;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:18px;transition:all .3s}
.detail-panel .panel-header .close-btn:hover{background:rgba(248,113,113,.2);border-color:rgba(248,113,113,.4);color:#f87171}
.detail-panel .panel-body{flex:1;overflow-y:auto;padding:16px 20px}
.detail-panel .panel-body .info-row{margin-bottom:12px}
.detail-panel .panel-body .info-row .label{font-size:11px;color:#6b7280;text-transform:uppercase;letter-spacing:1px;margin-bottom:3px}
.detail-panel .panel-body .info-row .value{font-size:13px;color:#e8e8ec}
.detail-panel .panel-body #leafletMap{height:200px;border-radius:10px;margin-top:12px;border:1px solid rgba(255,255,255,.08)}

/* 控制按钮 */
.controls{position:fixed;bottom:16px;right:16px;display:flex;gap:6px;z-index:50}
.ctrl-btn{width:36px;height:36px;border-radius:8px;background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:#9ca3af;font-size:16px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .3s}
.ctrl-btn:hover{background:rgba(167,139,250,.2);border-color:rgba(167,139,250,.4);color:#fff}

/* 加载 */
.loading{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;transition:opacity .8s}
.loading.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:36px;height:36px;border:2px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin 1s linear infinite}
.loading-text{margin-top:12px;font-size:12px;color:#6b7280;letter-spacing:2px}
@keyframes spin{to{transform:rotate(360deg)}}

/* Toast */
.toast{position:fixed;top:100px;left:50%;transform:translateX(-50%) translateY(-20px);padding:10px 20px;border-radius:10px;background:rgba(0,0,0,.9);border:1px solid rgba(248,113,113,.3);color:#f87171;font-size:13px;z-index:150;opacity:0;transition:all .3s;pointer-events:none}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

@media(max-width:768px){
.search-box{min-width:280px;top:48px}
.search-box input{font-size:13px}
.city-panel{left:8px;top:auto;bottom:60px;transform:none;max-width:120px;padding:10px;max-height:25vh}
.city-panel h3{font-size:10px}
.city-item{font-size:10px;padding:4px 6px}
.detail-panel{width:100%;right:-100%}
.controls{bottom:10px;right:10px}
}
</style>
</head>
<body>

<div class="loading" id="loading">
<div class="loading-spinner"></div>
<div class="loading-text">加载三维地球引擎...</div>
</div>

<div class="nav-bar">
<div style="display:flex;align-items:center;gap:8px">
<svg width="22" height="22" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="url(#lg1)" stroke-width="2"/><circle cx="16" cy="16" r="6" fill="url(#lg1)"/><defs><linearGradient id="lg1" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#34d399"/></linearGradient></defs></svg>
<span class="logo">海龙空间智能 · Web3D</span>
</div>
<a href="index.html">← 返回主页</a>
</div>

<!-- 搜索框 -->
<div class="search-box">
<input type="text" id="searchInput" placeholder="搜索城市、地址..." autocomplete="off">
<button id="searchBtn">🔍 搜索</button>
</div>
<div class="search-results" id="searchResults"></div>

<!-- 城市面板 -->
<div class="city-panel" id="cityPanel">
<h3>📍 快速定位</h3>
<div id="cityList"></div>
</div>

<!-- 详情面板 -->
<div class="detail-panel" id="detailPanel">
<div class="panel-header">
<h3 id="panelTitle">位置详情</h3>
<div class="close-btn" id="panelClose">×</div>
</div>
<div class="panel-body">
<div class="info-row"><div class="label">名称</div><div class="value" id="detailName">-</div></div>
<div class="info-row"><div class="label">地址</div><div class="value" id="detailAddr">-</div></div>
<div class="info-row"><div class="label">经纬度</div><div class="value" id="detailCoords">-</div></div>
<div class="info-row"><div class="label">类型</div><div class="value" id="detailType">-</div></div>
<div id="leafletMap"></div>
</div>
</div>

<!-- 3D容器 -->
<div id="globe-container"></div>

<!-- 控制 -->
<div class="controls">
<div class="ctrl-btn" id="btnReset" title="重置">⌖</div>
<div class="ctrl-btn" id="btnZoomIn" title="放大">+</div>
<div class="ctrl-btn" id="btnZoomOut" title="缩小">−</div>
<div class="ctrl-btn" id="btnRotate" title="自动旋转">↻</div>
<div class="ctrl-btn" id="btnPanel" title="详情">ℹ</div>
</div>

<div class="toast" id="toast"></div>

<script src="https://unpkg.com/three@0.160.0/build/three.min.js"></script>
<script src="https://unpkg.com/three-globe@2.30.0/dist/three-globe.min.js"></script>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
// ===== 城市数据 =====
const cities = [
  {name:'北京',lat:39.9042,lng:116.4074,desc:'中国首都',type:'cn'},
  {name:'上海',lat:31.2304,lng:121.4737,desc:'国际金融中心',type:'cn'},
  {name:'广州',lat:23.1291,lng:113.2644,desc:'粤港澳大湾区核心',type:'cn'},
  {name:'深圳',lat:22.5431,lng:114.0579,desc:'科技创新之都',type:'cn'},
  {name:'杭州',lat:30.2741,lng:120.1551,desc:'数字经济第一城',type:'cn'},
  {name:'成都',lat:30.5728,lng:104.0668,desc:'西部中心城市',type:'cn'},
  {name:'武汉',lat:30.5928,lng:114.3055,desc:'九省通衢',type:'cn'},
  {name:'西安',lat:34.3416,lng:108.9398,desc:'古都新貌',type:'cn'},
  {name:'南京',lat:32.0603,lng:118.7969,desc:'六朝古都',type:'cn'},
  {name:'重庆',lat:29.5630,lng:106.5516,desc:'山城雾都',type:'cn'},
  {name:'纽约',lat:40.7128,lng:-74.0060,desc:'世界金融中心',type:'world'},
  {name:'伦敦',lat:51.5074,lng:-0.1278,desc:'欧洲金融中心',type:'world'},
  {name:'东京',lat:35.6762,lng:139.6503,desc:'亚洲科技中心',type:'world'},
  {name:'悉尼',lat:-33.8688,lng:151.2093,desc:'南半球门户',type:'world'},
];

// ===== Three.js 场景 =====
const container = document.getElementById('globe-container');
const scene = new THREE.Scene();
scene.add(new THREE.AmbientLight(0x404040, 1.5));
const dirLight = new THREE.DirectionalLight(0xffffff, 1);
dirLight.position.set(5, 3, 5);
scene.add(dirLight);

const camera = new THREE.PerspectiveCamera(50, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.set(0, 0, 220);

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
container.appendChild(renderer.domElement);

// ===== ThreeGlobe =====
const globe = new ThreeGlobe()
  .globeImageUrl('https://unpkg.com/three-globe@2.30.0/example/img/earth-blue-marble.jpg')
  .bumpImageUrl('https://unpkg.com/three-globe@2.30.0/example/img/earth-topology.png')
  .showAtmosphere(true)
  .atmosphereColor('#3b82f6')
  .atmosphereAltitude(0.15)
  .pointsData(cities)
  .pointLat('lat')
  .pointLng('lng')
  .pointColor(d => d.type === 'cn' ? '#ff6b6b' : '#4ecdc4')
  .pointAltitude(0.01)
  .pointRadius(0.4)
  .pointResolution(16)
  .labelsData(cities)
  .labelLat('lat')
  .labelLng('lng')
  .labelText('name')
  .labelSize(1.2)
  .labelDotRadius(0.25)
  .labelColor(() => 'rgba(255,255,255,0.85)')
  .labelAltitude(0.02)
  .labelResolution(2);

scene.add(globe);

// 星空背景
const starGeo = new THREE.BufferGeometry();
const starCount = 3000;
const starPos = new Float32Array(starCount * 3);
for(let i=0;i<starCount*3;i++) starPos[i] = (Math.random()-0.5)*600;
starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
scene.add(new THREE.Points(starGeo, new THREE.PointsMaterial({size:0.5,color:0xffffff,transparent:true,opacity:0.7})));

// ===== 相机控制 =====
let autoRotate = true;
let isDragging = false;
let prevPos = {x:0,y:0};
let rot = {x:0,y:0};
let targetRot = {x:0.3,y:0};
let zoom = 220;
let targetZoom = 220;

function toRad(d){return d*Math.PI/180}

// 鼠标
container.addEventListener('mousedown', e=>{isDragging=true;autoRotate=false;prevPos={x:e.clientX,y:e.clientY}});
container.addEventListener('mousemove', e=>{
  if(!isDragging)return;
  targetRot.y += (e.clientX-prevPos.x)*0.3;
  targetRot.x += (e.clientY-prevPos.y)*0.3;
  targetRot.x = Math.max(-90,Math.min(90,targetRot.x));
  prevPos={x:e.clientX,y:e.clientY};
});
container.addEventListener('mouseup',()=>isDragging=false);
container.addEventListener('mouseleave',()=>isDragging=false);
container.addEventListener('wheel',e=>{targetZoom+=e.deltaY*0.3;targetZoom=Math.max(120,Math.min(400,targetZoom))});

// 触摸
container.addEventListener('touchstart',e=>{if(e.touches.length===1){isDragging=true;autoRotate=false;prevPos={x:e.touches[0].clientX,y:e.touches[0].clientY}}});
container.addEventListener('touchmove',e=>{
  if(isDragging&&e.touches.length===1){
    targetRot.y += (e.touches[0].clientX-prevPos.x)*0.5;
    targetRot.x += (e.touches[0].clientY-prevPos.y)*0.5;
    targetRot.x = Math.max(-90,Math.min(90,targetRot.x));
    prevPos={x:e.touches[0].clientX,y:e.touches[0].clientY};
  }
});
container.addEventListener('touchend',()=>isDragging=false);

// ===== 飞转到指定经纬度 =====
function flyTo(lat, lng, distance, duration=1500) {
  autoRotate = false;
  const startTime = performance.now();
  const startRotY = rot.y;
  const startRotX = rot.x;
  const startZoom = zoom;

  // 计算目标旋转角度
  const targetY = -lng;
  const targetX = lat;

  function animate(now) {
    const elapsed = now - startTime;
    const progress = Math.min(elapsed / duration, 1);
    const ease = 1 - Math.pow(1 - progress, 3);

    rot.y = startRotY + (targetY - startRotY) * ease;
    rot.x = startRotX + (targetX - startRotX) * ease;
    zoom = startZoom + (distance - startZoom) * ease;

    if (progress < 1) requestAnimationFrame(animate);
  }
  requestAnimationFrame(animate);
}

// ===== 搜索功能 =====
const searchInput = document.getElementById('searchInput');
const searchBtn = document.getElementById('searchBtn');
const searchResults = document.getElementById('searchResults');
let searchCache = {};
let searchTimeout;

async function doSearch(query) {
  if(!query.trim())return;
  searchBtn.disabled = true;
  searchBtn.textContent = '搜索中...';

  try {
    // 先搜索预设城市
    const presetMatches = cities.filter(c => c.name.includes(query) || query.includes(c.name));

    // 调用Nominatim API
    const cacheKey = query.toLowerCase();
    let apiResults = searchCache[cacheKey];

    if(!apiResults) {
      const res = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query)}&format=json&limit=5&accept-language=zh-CN`, {
        headers: {'User-Agent': 'HailongGIS-Web3D/1.0'}
      });
      apiResults = await res.json();
      searchCache[cacheKey] = apiResults;
    }

    displayResults([...presetMatches.map(c=>({...c,display_name:c.desc,osm_type:'preset'})), ...apiResults]);
  } catch(e) {
    showToast('搜索失败，请检查网络');
  }

  searchBtn.disabled = false;
  searchBtn.textContent = '🔍 搜索';
}

function displayResults(results) {
  searchResults.innerHTML = '';
  if(results.length===0){searchResults.classList.remove('show');return;}

  results.slice(0,8).forEach(r=>{
    const item = document.createElement('div');
    item.className = 'search-result-item';
    const name = r.name || r.display_name.split(',')[0];
    const addr = r.display_name || '';
    const lat = parseFloat(r.lat);
    const lon = parseFloat(r.lon || r.lng);
    item.innerHTML = `<div class="name">${name}</div><div class="addr">${addr}</div>`;
    item.addEventListener('click',()=>{
      searchResults.classList.remove('show');
      searchInput.value = name;
      flyTo(lat, lon, 150);
      showDetail(name, addr, lat, lon, r.type || '地点');
    });
    searchResults.appendChild(item);
  });

  searchResults.classList.add('show');
}

searchBtn.addEventListener('click',()=>doSearch(searchInput.value));
searchInput.addEventListener('keydown',e=>{if(e.key==='Enter')doSearch(searchInput.value)});
searchInput.addEventListener('input',()=>{
  clearTimeout(searchTimeout);
  if(searchInput.value.length>=2){
    searchTimeout=setTimeout(()=>doSearch(searchInput.value),500);
  } else {
    searchResults.classList.remove('show');
  }
});

// 点击外部关闭搜索结果
document.addEventListener('click',e=>{
  if(!e.target.closest('.search-box')&&!e.target.closest('.search-results')){
    searchResults.classList.remove('show');
  }
});

// ===== 详情面板 =====
let leafletMap = null;
const detailPanel = document.getElementById('detailPanel');

function showDetail(name, addr, lat, lng, type) {
  document.getElementById('panelTitle').textContent = name;
  document.getElementById('detailName').textContent = name;
  document.getElementById('detailAddr').textContent = addr || '未知地址';
  document.getElementById('detailCoords').textContent = `${lat.toFixed(4)}°N, ${Math.abs(lng).toFixed(4)}°${lng>=0?'E':'W'}`;
  document.getElementById('detailType').textContent = type || '地点';

  detailPanel.classList.add('open');

  // 初始化或更新Leaflet地图
  setTimeout(()=>{
    if(leafletMap){leafletMap.remove();}
    leafletMap = L.map('leafletMap').setView([lat,lng],13);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
      attribution:'&copy; OpenStreetMap',
      maxZoom:19
    }).addTo(leafletMap);
    L.marker([lat,lng]).addTo(leafletMap).bindPopup(name).openPopup();
  },300);
}

document.getElementById('panelClose').addEventListener('click',()=>{
  detailPanel.classList.remove('open');
});

// ===== 城市列表 =====
const cityList = document.getElementById('cityList');
cities.forEach(city=>{
  const item = document.createElement('div');
  item.className = 'city-item';
  item.innerHTML = `<div class="city-dot ${city.type==='world'?'world':''}"></div>${city.name}`;
  item.addEventListener('click',()=>{
    flyTo(city.lat,city.lng,150);
    showDetail(city.name,city.desc,city.lat,city.lng,city.type==='cn'?'中国城市':'世界城市');
  });
  cityList.appendChild(item);
});

// ===== 控制按钮 =====
document.getElementById('btnReset').addEventListener('click',()=>{
  targetRot={x:0.3,y:0};targetZoom=220;autoRotate=true;detailPanel.classList.remove('open');
});
document.getElementById('btnZoomIn').addEventListener('click',()=>targetZoom=Math.max(120,targetZoom-30));
document.getElementById('btnZoomOut').addEventListener('click',()=>targetZoom=Math.min(400,targetZoom+30));
document.getElementById('btnRotate').addEventListener('click',()=>autoRotate=!autoRotate);
document.getElementById('btnPanel').addEventListener('click',()=>detailPanel.classList.toggle('open'));

// ===== Toast =====
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),3000);
}

// ===== 动画循环 =====
function animate() {
  requestAnimationFrame(animate);

  if(autoRotate&&!isDragging) targetRot.y += 0.05;

  rot.x += (targetRot.x - rot.x) * 0.05;
  rot.y += (targetRot.y - rot.y) * 0.05;
  zoom += (targetZoom - zoom) * 0.05;

  const phi = toRad(90 - rot.x);
  const theta = toRad(rot.y + 180);
  camera.position.x = zoom * Math.sin(phi) * Math.cos(theta);
  camera.position.y = zoom * Math.cos(phi);
  camera.position.z = zoom * Math.sin(phi) * Math.sin(theta);
  camera.lookAt(0,0,0);

  renderer.render(scene, camera);
}

// ===== 窗口调整 =====
window.addEventListener('resize',()=>{
  camera.aspect = window.innerWidth/window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth,window.innerHeight);
});

// ===== 加载完成 =====
setTimeout(()=>document.getElementById('loading').classList.add('hidden'),2000);
animate();
</script>

</body>
</html>
