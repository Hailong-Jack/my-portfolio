<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>SmartGIS Web3D - 海龙空间智能</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#e8e8ec;font-family:'Inter',-apple-system,sans-serif;overflow:hidden}
#canvas-container{position:fixed;inset:0;z-index:1}
#ui-layer{position:fixed;inset:0;z-index:10;pointer-events:none}
#ui-layer > *{pointer-events:auto}
.nav-bar{position:fixed;top:0;left:0;right:0;padding:14px 24px;display:flex;justify-content:space-between;align-items:center;backdrop-filter:blur(20px);background:rgba(10,10,15,.85);border-bottom:1px solid rgba(255,255,255,.05);z-index:20}
.nav-bar a{color:#9ca3af;text-decoration:none;font-size:14px;font-weight:500;transition:color .3s}
.nav-bar a:hover{color:#a78bfa}
.logo{font-weight:800;font-size:18px;letter-spacing:-.5px;background:linear-gradient(135deg,#a78bfa,#60a5fa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.info-panel{position:fixed;bottom:24px;left:24px;padding:20px 24px;border-radius:16px;background:rgba(10,10,15,.8);border:1px solid rgba(167,139,250,.2);backdrop-filter:blur(10px);max-width:300px;z-index:20}
.info-panel h2{font-size:18px;font-weight:700;margin-bottom:8px;color:#fff}
.info-panel p{font-size:13px;color:#9ca3af;line-height:1.7;margin-bottom:12px}
.info-panel .stats{display:flex;gap:20px}
.info-panel .stats div{text-align:center}
.info-panel .stats div .num{font-size:22px;font-weight:800;color:#a78bfa}
.info-panel .stats div .label{font-size:11px;color:#6b7280;margin-top:2px}
.controls-hint{position:fixed;bottom:24px;right:24px;padding:14px 18px;border-radius:12px;background:rgba(10,10,15,.7);border:1px solid rgba(255,255,255,.08);font-size:12px;color:#6b7280;z-index:20}
.loading{position:fixed;inset:0;background:#0a0a0f;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:100;transition:opacity .5s}
.loading.hidden{opacity:0;pointer-events:none}
.loading-spinner{width:48px;height:48px;border:2px solid rgba(167,139,250,.2);border-top-color:#a78bfa;border-radius:50%;animation:spin 1s linear infinite}
.loading-text{margin-top:16px;font-size:14px;color:#9ca3af;letter-spacing:2px}
@keyframes spin{to{transform:rotate(360deg)}}
.glow-text{background:linear-gradient(135deg,#a78bfa 0%,#60a5fa 50%,#34d399 100%);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
@media(max-width:768px){
.info-panel{bottom:16px;left:16px;right:16px;max-width:none}
.controls-hint{display:none}
}
</style>
</head>
<body>

<div class="loading" id="loading">
<div class="loading-spinner"></div>
<div class="loading-text">正在加载三维引擎...</div>
</div>

<div class="nav-bar">
<div style="display:flex;align-items:center;gap:10px">
<svg width="28" height="28" viewBox="0 0 32 32" fill="none"><circle cx="16" cy="16" r="14" stroke="url(#lg1)" stroke-width="2"/><circle cx="16" cy="16" r="6" fill="url(#lg1)"/><defs><linearGradient id="lg1" x1="0" y1="0" x2="32" y2="32"><stop stop-color="#a78bfa"/><stop offset="1" stop-color="#34d399"/></linearGradient></defs></svg>
<span class="logo">海龙空间智能</span>
</div>
<a href="index.html">← 返回主页</a>
</div>

<div id="canvas-container"></div>

<div class="info-panel">
<h2>SmartGIS <span class="glow-text">Web3D</span></h2>
<p>无插件、轻量级三维在线应用平台。支持海量三维数据加载与实时渲染。</p>
<div class="stats">
<div><div class="num" id="stat-points">0</div><div class="label">数据节点</div></div>
<div><div class="num" id="stat-fps">60</div><div class="label">FPS</div></div>
<div><div class="num">WebGL</div><div class="label">渲染引擎</div></div>
</div>
</div>

<div class="controls-hint">
🖱️ 拖拽旋转 &nbsp;|&nbsp; 🔍 滚轮缩放 &nbsp;|&nbsp; 👆 触摸操作
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// ===== Three.js 3D场景 =====
const container = document.getElementById('canvas-container');
const scene = new THREE.Scene();
scene.fog = new THREE.FogExp2(0x0a0a0f, 0.02);

const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
camera.position.z = 3.5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setClearColor(0x0a0a0f, 1);
container.appendChild(renderer.domElement);

// ===== 地球主体 =====
const earthGroup = new THREE.Group();
scene.add(earthGroup);

// 地球球体
const earthGeometry = new THREE.SphereGeometry(1, 64, 64);
const earthMaterial = new THREE.MeshPhongMaterial({
    color: 0x1a1a2e,
    emissive: 0x0f0f23,
    emissiveIntensity: 0.3,
    shininess: 30,
    transparent: true,
    opacity: 0.95
});
const earth = new THREE.Mesh(earthGeometry, earthMaterial);
earthGroup.add(earth);

// 地球网格线
const wireframeGeometry = new THREE.SphereGeometry(1.005, 32, 32);
const wireframeMaterial = new THREE.MeshBasicMaterial({
    color: 0xa78bfa,
    wireframe: true,
    transparent: true,
    opacity: 0.08
});
const wireframe = new THREE.Mesh(wireframeGeometry, wireframeMaterial);
earthGroup.add(wireframe);

// 经线（更明显的线条）
for (let i = 0; i < 12; i++) {
    const angle = (i / 12) * Math.PI * 2;
    const curve = new THREE.EllipseCurve(0, 0, 1.01, 1.01, 0, Math.PI * 2, false, angle);
    const points = curve.getPoints(64);
    const geometry = new THREE.BufferGeometry().setFromPoints(points.map(p => new THREE.Vector3(p.x, p.y, 0)));
    const material = new THREE.LineBasicMaterial({ color: 0xa78bfa, transparent: true, opacity: 0.1 });
    const line = new THREE.Line(geometry, material);
    line.rotation.y = angle;
    earthGroup.add(line);
}

// 纬线
for (let i = 1; i < 6; i++) {
    const lat = (i / 6) * Math.PI / 2;
    const radius = Math.cos(lat) * 1.01;
    const y = Math.sin(lat) * 1.01;
    const curve = new THREE.EllipseCurve(0, 0, radius, radius, 0, Math.PI * 2, false, 0);
    const points = curve.getPoints(64);
    const geometry = new THREE.BufferGeometry().setFromPoints(points.map(p => new THREE.Vector3(p.x, y, p.y)));
    const material = new THREE.LineBasicMaterial({ color: 0x60a5fa, transparent: true, opacity: 0.08 });
    const line = new THREE.Line(geometry, material);
    earthGroup.add(line);

    const geometry2 = new THREE.BufferGeometry().setFromPoints(points.map(p => new THREE.Vector3(p.x, -y, p.y)));
    const line2 = new THREE.Line(geometry2, material);
    earthGroup.add(line2);
}

// ===== 数据节点（发光点）=====
const dataPoints = [];
const pointCount = 80;
const pointGeometry = new THREE.SphereGeometry(0.015, 8, 8);

for (let i = 0; i < pointCount; i++) {
    const phi = Math.acos(-1 + (2 * i) / pointCount);
    const theta = Math.sqrt(pointCount * Math.PI) * phi;

    const x = Math.cos(theta) * Math.sin(phi) * 1.02;
    const y = Math.sin(theta) * Math.sin(phi) * 1.02;
    const z = Math.cos(phi) * 1.02;

    const colors = [0xa78bfa, 0x60a5fa, 0x34d399, 0xf472b6, 0xfbbf24];
    const color = colors[Math.floor(Math.random() * colors.length)];

    const material = new THREE.MeshBasicMaterial({ color: color });
    const point = new THREE.Mesh(pointGeometry, material);
    point.position.set(x, y, z);

    // 发光光晕
    const glowGeometry = new THREE.SphereGeometry(0.04, 8, 8);
    const glowMaterial = new THREE.MeshBasicMaterial({
        color: color,
        transparent: true,
        opacity: 0.15
    });
    const glow = new THREE.Mesh(glowGeometry, glowMaterial);
    glow.position.set(x, y, z);

    earthGroup.add(point);
    earthGroup.add(glow);

    dataPoints.push({
        mesh: point,
        glow: glow,
        baseY: y,
        phase: Math.random() * Math.PI * 2,
        speed: 0.5 + Math.random() * 1.5
    });
}

// 连接线
const lineMaterial = new THREE.LineBasicMaterial({ color: 0xa78bfa, transparent: true, opacity: 0.06 });
for (let i = 0; i < 30; i++) {
    const idx1 = Math.floor(Math.random() * pointCount);
    const idx2 = Math.floor(Math.random() * pointCount);
    if (idx1 !== idx2) {
        const p1 = dataPoints[idx1].mesh.position;
        const p2 = dataPoints[idx2].mesh.position;
        const geometry = new THREE.BufferGeometry().setFromPoints([p1, p2]);
        const line = new THREE.Line(geometry, lineMaterial);
        earthGroup.add(line);
    }
}

// ===== 星星背景 =====
const starsGeometry = new THREE.BufferGeometry();
const starsCount = 2000;
const starsPositions = new Float32Array(starsCount * 3);
for (let i = 0; i < starsCount * 3; i++) {
    starsPositions[i] = (Math.random() - 0.5) * 50;
}
starsGeometry.setAttribute('position', new THREE.BufferAttribute(starsPositions, 3));
const starsMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.02, transparent: true, opacity: 0.6 });
const stars = new THREE.Points(starsGeometry, starsMaterial);
scene.add(stars);

// ===== 光源 =====
const ambientLight = new THREE.AmbientLight(0x404080, 0.5);
scene.add(ambientLight);

const directionalLight = new THREE.DirectionalLight(0xa78bfa, 0.8);
directionalLight.position.set(5, 3, 5);
scene.add(directionalLight);

const pointLight = new THREE.PointLight(0x60a5fa, 0.5, 10);
pointLight.position.set(-3, 2, 3);
scene.add(pointLight);

// ===== 交互控制 =====
let isDragging = false;
let previousMousePosition = { x: 0, y: 0 };
let targetRotation = { x: 0, y: 0 };
let currentRotation = { x: 0, y: 0 };

// 鼠标事件
renderer.domElement.addEventListener('mousedown', (e) => {
    isDragging = true;
    previousMousePosition = { x: e.clientX, y: e.clientY };
});

renderer.domElement.addEventListener('mousemove', (e) => {
    if (isDragging) {
        const deltaX = e.clientX - previousMousePosition.x;
        const deltaY = e.clientY - previousMousePosition.y;
        targetRotation.y += deltaX * 0.005;
        targetRotation.x += deltaY * 0.005;
        targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.x));
        previousMousePosition = { x: e.clientX, y: e.clientY };
    }
});

renderer.domElement.addEventListener('mouseup', () => isDragging = false);
renderer.domElement.addEventListener('mouseleave', () => isDragging = false);

// 滚轮缩放
renderer.domElement.addEventListener('wheel', (e) => {
    camera.position.z += e.deltaY * 0.002;
    camera.position.z = Math.max(1.8, Math.min(8, camera.position.z));
});

// 触摸事件
renderer.domElement.addEventListener('touchstart', (e) => {
    if (e.touches.length === 1) {
        isDragging = true;
        previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
});

renderer.domElement.addEventListener('touchmove', (e) => {
    if (isDragging && e.touches.length === 1) {
        const deltaX = e.touches[0].clientX - previousMousePosition.x;
        const deltaY = e.touches[0].clientY - previousMousePosition.y;
        targetRotation.y += deltaX * 0.008;
        targetRotation.x += deltaY * 0.008;
        targetRotation.x = Math.max(-Math.PI / 2, Math.min(Math.PI / 2, targetRotation.x));
        previousMousePosition = { x: e.touches[0].clientX, y: e.touches[0].clientY };
    }
});

renderer.domElement.addEventListener('touchend', () => isDragging = false);

// ===== 动画循环 =====
let frameCount = 0;
let lastTime = performance.now();
let fps = 60;

function animate() {
    requestAnimationFrame(animate);

    const now = performance.now();
    frameCount++;
    if (now - lastTime >= 1000) {
        fps = frameCount;
        frameCount = 0;
        lastTime = now;
        document.getElementById('stat-fps').textContent = fps;
    }

    // 自动旋转
    if (!isDragging) {
        targetRotation.y += 0.001;
    }

    // 平滑插值
    currentRotation.x += (targetRotation.x - currentRotation.x) * 0.05;
    currentRotation.y += (targetRotation.y - currentRotation.y) * 0.05;

    earthGroup.rotation.x = currentRotation.x;
    earthGroup.rotation.y = currentRotation.y;

    // 数据点脉动
    const time = now * 0.001;
    dataPoints.forEach((dp, i) => {
        const scale = 1 + Math.sin(time * dp.speed + dp.phase) * 0.3;
        dp.mesh.scale.setScalar(scale);
        dp.glow.material.opacity = 0.1 + Math.sin(time * dp.speed + dp.phase) * 0.08;
    });

    // 星星微动
    stars.rotation.y += 0.0002;

    renderer.render(scene, camera);
}

// ===== 窗口调整 =====
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// ===== 初始化 =====
document.getElementById('stat-points').textContent = pointCount;

// 隐藏加载画面
setTimeout(() => {
    document.getElementById('loading').classList.add('hidden');
}, 1500);

animate();
</script>

</body>
</html>
